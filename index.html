<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Valter Izidoro - Edição 8.5</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #f5f8ec;
      font-family: 'Quicksand', sans-serif;
      color: #333;
      text-align: center;
    }

    header {
      padding: 60px 20px 30px;
      animation: fadeIn 1.5s ease-in;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      color: #152147;
      font-size: 2.8em;
      margin-bottom: 20px;
    }

    .quote {
      color: #a97d38;
      font-size: 1.3em;
      max-width: 700px;
      margin: auto;
      font-style: italic;
    }

    .divider {
      width: 60%;
      height: 1px;
      background: #ccc;
      margin: 40px auto;
    }

    .countdown {
      font-size: 1.5em;
      margin: 20px 0;
      color: #152147;
    }

    .event-info {
      font-size: 1.2em;
    }

    iframe {
      width: 90%;
      max-width: 700px;
      height: 500px;
      border: none;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .text-section {
      max-width: 700px;
      margin: auto;
      padding: 0 20px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      padding: 20px;
    }

    .gallery img {
      width: 100%;
      border-radius: 10px;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }
</html>
